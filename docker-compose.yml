services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: solara
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solara_dev_password}
      POSTGRES_DB: solara_production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solara -d solara_production"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3080:80"
    env_file: .env
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgresql://solara:${POSTGRES_PASSWORD:-solara_dev_password}@db:5432/solara_production
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_RELATIVE_URL_ROOT: "/solara"
    volumes:
      - storage:/rails/storage

volumes:
  pgdata:
  storage:
